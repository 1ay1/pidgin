<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- ACP agent: a friendly robot head -->
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a8dee"/>
      <stop offset="1" stop-color="#3a63c0"/>
    </linearGradient>
  </defs>
  <!-- antenna -->
  <line x1="24" y1="4" x2="24" y2="11" stroke="#3a63c0" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="24" cy="4" r="2.6" fill="#4e9a06"/>
  <!-- head -->
  <rect x="8" y="11" width="32" height="27" rx="7" fill="url(#body)" stroke="#2c4a94" stroke-width="1.5"/>
  <!-- face plate -->
  <rect x="12.5" y="16" width="23" height="14" rx="4" fill="#eaf1ff"/>
  <!-- eyes -->
  <circle cx="19" cy="23" r="3" fill="#2c4a94"/>
  <circle cx="29" cy="23" r="3" fill="#2c4a94"/>
  <circle cx="20" cy="22" r="1" fill="#ffffff"/>
  <circle cx="30" cy="22" r="1" fill="#ffffff"/>
  <!-- mouth / speech line -->
  <rect x="18" y="33" width="12" height="2.4" rx="1.2" fill="#eaf1ff"/>
  <!-- ears -->
  <rect x="4.5" y="20" width="3.5" height="9" rx="1.6" fill="#3a63c0"/>
  <rect x="40" y="20" width="3.5" height="9" rx="1.6" fill="#3a63c0"/>
</svg>
